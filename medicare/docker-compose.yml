services:
  postgres:
    image: postgres:18
    container_name: medicare-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: medicare
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql
  mongodb:
    image: mongo:7.0
    container_name: medicare-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db
volumes:
  postgres_data:
  mongo_data: